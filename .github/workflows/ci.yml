name: CI

on:
    push:
        branches: [main, develop]
        tags: ["v*"]
    pull_request:
        branches: [main, develop]
    workflow_dispatch:

permissions:
    contents: read

env:
    PUBLISH_NODE_VERSION: "24"

jobs:
    checks:
        name: Checks (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: ["22", "24"]
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Smoke-test package files
              run: npm run smoke:package

            - name: Dry-run pack
              run: npm run publish:dry-run

    smoke-package:
        name: Smoke package (Node ${{ matrix.node-version }})
        needs: [checks]
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: ["22", "24"]
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Smoke-test packed artifact
              run: npm run smoke:package

    publish:
        name: Publish
        needs: [checks, smoke-package]
        if: |
            (
              (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
              (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
            ) &&
            needs.checks.result == 'success' &&
            needs.smoke-package.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.PUBLISH_NODE_VERSION }}

            - name: Verify artifact before publish
              run: npm run smoke:package

            - name: Check package version
              run: node -e "const p=require('./package.json'); console.log(p.name, p.version)"

            - name: Configure npm auth
              run: |
                echo "registry=https://registry.npmjs.org/" > ~/.npmrc
                echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
              env:
                NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish to npm
              run: npm publish --access public --ignore-scripts
              env:
                NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
